const quizBase = JSON.parse(JSON.stringify(quiz));

function shuffle(array) {
  for (let i = array.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [array[i], array[j]] = [array[j], array[i]];
  }
}

function generateQuizSelection() {
  const copy = JSON.parse(JSON.stringify(quizBase));
  shuffle(copy);
  return copy.slice(0, 20);
}

let quizSelection = generateQuizSelection();

    q.answers.forEach((answer, index) => {
      const btn = document.createElement("button");
      btn.innerText = answer;
      btn.onclick = () => checkQCM(index, btn);
      answersDiv.appendChild(btn);
    });
  } else if (q.type === "text") {
    const input = document.createElement("input");
    input.placeholder = "Écris ta réponse ici";

    const btn = document.createElement("button");
    btn.innerText = "Valider";
    btn.classList.add("validate-btn");
    btn.onclick = () => checkText(input.value);

    answersDiv.appendChild(input);
    answersDiv.appendChild(btn);
  }
}

function checkQCM(index, button) {
  const q = quizSelection[currentQuestion];
  const correctAnswers = Array.isArray(q.correct) ? q.correct : [q.correct];

  const buttons = document.querySelectorAll("button");

  // toggle sélection
  if (button.classList.contains("selected")) {
  button.classList.remove("selected");
  } else {
  button.classList.add("selected");
  }

  // bouton valider (ajouté dynamiquement si pas déjà là)
  if (!document.getElementById("validateBtn")) {
    const validateBtn = document.createElement("button");
    validateBtn.id = "validateBtn";
    validateBtn.innerText = "Valider";
    validateBtn.classList.add("validate-btn");

    validateBtn.onclick = () => {
      let selectedIndexes = [];

      buttons.forEach((btn, i) => {
        if (btn.classList.contains("selected")) {
          selectedIndexes.push(i);
        }

        btn.classList.remove("selected");

        btn.disabled = true;
      });

      let isCorrect =
        selectedIndexes.length === correctAnswers.length &&
        selectedIndexes.every(i => correctAnswers.includes(i));

      if (isCorrect) {
        score++;
      }

      // affichage visuel
      buttons.forEach((btn, i) => {
        if (correctAnswers.includes(i)) {
          btn.classList.add("correct");
        } else if (selectedIndexes.includes(i)) {
          btn.classList.add("wrong");
        }
      });

      setTimeout(nextQuestion, 1200);
    };

    document.getElementById("answers").appendChild(validateBtn);
  }
}

function normalize(str) {
  if (typeof str !== "string") return "";

  return str
    .toLowerCase()
    .normalize("NFD")
    .replace(/[\u0300-\u036f]/g, "")
    .trim();
}

function levenshtein(a, b) {
  const matrix = [];

  for (let i = 0; i <= b.length; i++) matrix[i] = [i];
  for (let j = 0; j <= a.length; j++) matrix[0][j] = j;

  for (let i = 1; i <= b.length; i++) {
    for (let j = 1; j <= a.length; j++) {
      if (b[i - 1] === a[j - 1]) {
        matrix[i][j] = matrix[i - 1][j - 1];
      } else {
        matrix[i][j] = Math.min(
          matrix[i - 1][j - 1] + 1,
          matrix[i][j - 1] + 1,
          matrix[i - 1][j] + 1
        );
      }
    }
  }

  return matrix[b.length][a.length];
}

function checkText(value) {
  const user = normalize(value);
  let answersRaw = quizSelection[currentQuestion].correctAnswers || [quizSelection[currentQuestion].correctAnswer];

  const answers = answersRaw.map(a => normalize(a));
  const feedback = document.getElementById("feedback");

  let isCorrect = false;

  for (let correct of answers) {
    const distance = levenshtein(user, correct);
    if (distance <= 2) {
      isCorrect = true;
      break;
    }
  }

  if (isCorrect) {
    feedback.innerText = "✅ Correct !";
    score++;
  } else {
    feedback.innerText = "❌ Mauvaise réponse (ex: " + answers[0] + ")";
  }

  nextQuestion();
}

function nextQuestion() {
  setTimeout(() => {
    currentQuestion++;
    if (currentQuestion < quizSelection.length) {
      loadQuestion();
    } else {
      showScore();
    }
  }, 1200);
}

function showScore() {
  document.querySelector(".quiz-container").innerHTML =
    "<h2>Score final : " + score + " / " + quizSelection.length + "</h2>" +
    "<button class='validate-btn' onclick='restartQuiz()'>Recommencer</button>";
}

function restartQuiz() {
  currentQuestion = 0;
  score = 0;

  quizSelection = generateQuizSelection();

  document.querySelector(".quiz-container").innerHTML = `
    <h2 id="question"></h2>
    <div id="answers"></div>
    <p id="feedback"></p>
  `;

  loadQuestion();
}


loadQuestion();
